name: two-stage-build-and-deploy

on:
  push:
    branches: [ main ]

env:
  # Регистр для финального образа (можно поменять на docker.io)
  REGISTRY: ghcr.io
  # Название финального образа
  IMAGE_NAME: myorg/myservice:latest

jobs:
  # ---------- ПЕРВЫЙ ПЛАН: компиляция бинарника ----------
  build-binary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout исходный код микросервиса
        uses: actions/checkout@v4
        with:
          repository: myorg/microservice   # репозиторий с исходниками
          path: source                     # положить в папку source

      - name: Компиляция бинарника в Docker-контейнере
        run: |
          # Запускаем контейнер с нужной версией Go (или другого компилятора)
          docker run --rm -v ${{ github.workspace }}/source:/app -w /app \
            golang:1.21-alpine sh -c "go build -o /app/myapp ./cmd/server"
          # Бинарник появится в source/myapp

      - name: Сохранить бинарник как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: myapp-binary
          path: source/myapp
          retention-days: 1

  # ---------- ВТОРОЙ ПЛАН: сборка финального образа (с конфигами из другого репо) ----------
  build-deploy-image:
    runs-on: ubuntu-latest
    needs: build-binary            # строгая зависимость от первого плана
    steps:
      # 1. Скачать артефакт с бинарником
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: myapp-binary
          path: ./binary

      # 2. Клонировать второй репозиторий с конфигами и параметрами деплоя
      - name: Checkout репозиторий конфигурации
        uses: actions/checkout@v4
        with:
          repository: myorg/infrastructure   # другой репозиторий
          path: configs

      # 3. Подготовить структуру для Docker-образа
      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/bin docker-context/etc
          cp ./binary/myapp docker-context/bin/
          cp ./configs/deploy/production.yaml docker-context/etc/
          cp ./configs/docker/Dockerfile docker-context/

      # 4. Собрать и запушить финальный образ
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # или токен для Docker Hub

      - name: Build and push final image
        uses: docker/build-push-action@v5
        with:
          context: ./docker-context
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
