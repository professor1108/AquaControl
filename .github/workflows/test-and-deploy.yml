name: Two-Stage Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FINAL_IMAGE_NAME: professor1108/aquacontrol:latest

jobs:
  # ========== ЭТАП 1: Компиляция Go-бинарника ==========
  build-binary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          repository: professor1108/AquaControl
          path: source

      # Убедимся, что в репозитории есть go.mod
      - name: List source files (debug)
        run: ls -la source/

      - name: Compile Go binary
        run: |
          # Переходим в директорию с исходниками (если go.mod в корне source)
          cd source
          # Если ваш go.mod лежит в подпапке, например source/cmd/server, измените путь
          # Пример: cd cmd/server
          
          # Запускаем сборку в Docker-контейнере, но БЕЗ записи в GITHUB_ENV внутри контейнера
          docker run --rm \
            -v ${{ github.workspace }}/source:/app \
            -w /app \
            golang:1.21-alpine \
            sh -c "go build -o myapp ."
          
          # Проверяем, создался ли бинарник (уже на раннере, не в контейнере)
          if [ ! -f source/myapp ]; then
            echo "Ошибка: бинарник не создан"
            ls -la source/
            exit 1
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-binary
          path: source/myapp
          retention-days: 1

  # ========== ЭТАП 2: Сборка финального образа ==========
  build-deploy-image:
    runs-on: ubuntu-latest
    needs: build-binary
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: app-binary
          path: ./binary

      - name: Checkout config & Dockerfile repository
        uses: actions/checkout@v4
        with:
          repository: professor1108/AquaControl-deploy   # замените на ваш
          path: configs
          token: ${{ secrets.REPO_ACCESS_TOKEN }}       # если репо приватный

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/bin docker-context/etc
          cp ./binary/myapp docker-context/bin/
          # Копируем конфиги (если есть)
          if [ -f configs/production.yaml ]; then
            cp configs/production.yaml docker-context/etc/
          fi
          cp configs/Dockerfile docker-context/
          ls -la docker-context/

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push final image
        uses: docker/build-push-action@v5
        with:
          context: ./docker-context
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FINAL_IMAGE_NAME }}
