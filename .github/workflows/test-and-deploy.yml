name: Build and Deploy AquaControl Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER_LOWER: professor1108   # замените на свой логин в нижнем регистре

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Сборка основного сервиса
      - name: Build and push AquaControl image
        uses: docker/build-push-action@v5
        with:
          context: ./aquacontrol          # контекст — папка с сервисом
          file: ./aquacontrol/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/aquacontrol-aqua:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/aquacontrol-aqua:${{ github.sha }}

      # Сборка сервиса уведомлений
      - name: Build and push Notifications image
        uses: docker/build-push-action@v5
        with:
          context: ./notifications
          file: ./notifications/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/aquacontrol-notify:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/aquacontrol-notify:${{ github.sha }}
