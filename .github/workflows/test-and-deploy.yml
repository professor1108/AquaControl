name: Test and Deploy AquaControl

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_AQUA: ${{ github.repository }}-aqua        # строчные буквы гарантируем в шаге lower
  IMAGE_NAME_NOTIFY: ${{ github.repository }}-notify

jobs:
  # 1. Тестирование
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: aquadb
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # основной сервис
          pip install -r requirements.txt
          # микросервис уведомлений (если у него свой requirements, иначе можно объединить)
          pip install -r notifications/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Smoke test
        env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/aquadb
          NOTIFICATION_SERVICE_URL: http://localhost:8001/notify
        run: |
          # запускаем основной сервис (лежит в корне)
          uvicorn aq_main:app --host 0.0.0.0 --port 8000 &
          # запускаем микросервис из папки notifications
          cd notifications && uvicorn n_main:app --host 0.0.0.0 --port 8001 &
          cd ..
          sleep 5
          curl -f http://localhost:8000/health
          curl -f http://localhost:8001/health
          echo "Smoke test passed"

  # 2. Сборка и публикация образов + деплой
  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        id: lower
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_AQUA=${REPO_LOWER}-aqua" >> $GITHUB_ENV
          echo "IMAGE_NOTIFY=${REPO_LOWER}-notify" >> $GITHUB_ENV

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AquaControl image
        uses: docker/build-push-action@v5
        with:
          context: .                           # корень репозитория
          file: Dockerfile.aqua                # Dockerfile для основного сервиса
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_AQUA }}:latest

      - name: Build and push Notification image
        uses: docker/build-push-action@v5
        with:
          context: ./notifications             # папка notifications
          file: notifications/Dockerfile        # Dockerfile для уведомлений
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NOTIFY }}:latest

      - name: Deploy via SSH
        if: ${{ secrets.SSH_HOST != '' }}      # выполнится только если задан секрет
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/aquacontrol
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f
