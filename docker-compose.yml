version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aquadb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"      # только для отладки, можно убрать
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d aquadb"]
      interval: 5s
      timeout: 5s
      retries: 5

  aquacontrol:
    build:
      context: .          # корень проекта
      dockerfile: aquacontrol/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/aquadb
      NOTIFICATION_SERVICE_URL: http://notifications:8001/notify
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  notifications:
    build:
      context: .
      dockerfile: notifications/Dockerfile
    ports:
      - "8001:8001"
    restart: on-failure

volumes:
  postgres_data: